<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Label Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
}

/* INPUT */
input{
    margin:5px;
    padding:5px;
}

/* PRINT AREA */
#printArea{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* LABEL */
.label{
    width:100mm;
    height:50mm;
    border:2px solid #1e3a8a;
    border-radius:10px;
    padding:6px;
    position:relative;
    box-sizing:border-box;
    overflow:hidden;
    margin-bottom:5mm; /* spacing for screen only */
}

/* WATERMARK */
.watermark{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    color:#1e3a8a;
    opacity:0.08;
    pointer-events:none;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* AWB */
.awb{
    font-size:16px;
    font-weight:bold;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
    font-size:11px;
}

/* SIDES */
.left, .right{
    width:48%;
    text-align:left;
}

/* ARROW */
.arrow-box{
    position:absolute;
    top:5px;
    right:8px;
    text-align:center;
    font-size:10px;
}

.arrow{
    font-size:18px;
}

/* CHECKBOX */
.checkbox{
    margin-top:3px;
}

/* 🔥 PRINT SETTINGS (MOST IMPORTANT) */
@page{
    size:100mm 50mm;
    margin:0;
}

@media print{

body{
    margin:0;
}

/* Hide inputs */
button, input, h2, #copyBtn, #count{
    display:none;
}

/* Remove spacing */
#printArea{
    display:block;
}

/* EACH LABEL = EXACT PAGE */
.label{
    width:100mm;
    height:50mm;
    margin:0;
    border:2px solid #000;
    page-break-after:always;
    page-break-inside:avoid;
    break-after:page;
}

/* LAST LABEL FIX */
.label:last-child{
    page-break-after:auto;
}
}
</style>

<script>
function updateLabel(){
    let company = document.getElementById("company").value;
    document.getElementById("companyText").innerText = company;
    document.getElementById("watermark").innerText = company;
}

const fields = ["awb","party","po","inv","from","to","pkg"];

window.onload = function(){
    fields.forEach(id=>{
        document.getElementById(id).addEventListener("input",()=>{
            document.getElementById(id+"Text").innerText = document.getElementById(id).value;
        });
    });
}

/* 🔥 BULK PRINT FUNCTION */
function generateCopies(){
    let count = document.getElementById("count").value || 1;
    let original = document.getElementById("singleLabel").outerHTML;
    let container = document.getElementById("printArea");

    container.innerHTML = "";

    for(let i=0; i<count; i++){
        container.innerHTML += original;
    }
}
</script>

</head>

<body>

<h2>Logistics Label Generator</h2>

<input id="company" placeholder="Company Name" oninput="updateLabel()">
<input id="awb" placeholder="AWB">
<input id="party" placeholder="Party">
<input id="po" placeholder="PO">
<input id="inv" placeholder="INV">
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="pkg" placeholder="PKG">

<br><br>

<input id="count" type="number" placeholder="No. of Labels (e.g. 50)">
<button id="copyBtn" onclick="generateCopies()">Generate Bulk</button>

<br><br>

<button onclick="window.print()">Print</button>

<br><br>

<!-- PRINT AREA -->
<div id="printArea">

<!-- SINGLE LABEL TEMPLATE -->
<div class="label" id="singleLabel">

    <div class="watermark" id="watermark">COMPANY</div>

    <div class="header">
        <div id="companyText">COMPANY</div>
    </div>

    <div class="arrow-box">
        <span class="arrow">⬆</span>
        THIS SIDE UP
    </div>

    <div class="awb">
        AWB: <span id="awbText"></span>
    </div>

    <div class="row">
        <div class="left">
            PARTY: <span id="partyText"></span><br>
            PO: <span id="poText"></span><br>
            FROM: <span id="fromText"></span><br>
            PKG: <span id="pkgText"></span>
        </div>

        <div class="right">
            INV: <span id="invText"></span><br>
            TO: <span id="toText"></span><br>

            <div class="checkbox">
                <label><input type="checkbox"> Train</label>
                <label><input type="checkbox"> Air</label>
                <label><input type="checkbox"> Road</label>
            </div>
        </div>
    </div>

</div>

</div>

</body>
</html>
