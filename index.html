<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Label Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
}

/* INPUT */
input{
    margin:5px;
    padding:5px;
}

/* LABEL */
.label{
    width:100mm;
    height:50mm;
    border:2px solid #000;
    border-radius:10px;
    margin:auto;
    padding:6px;
    box-sizing:border-box;
    position:relative;
    overflow:hidden;
}

/* WATERMARK */
.watermark{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:38px;
    color:#000;
    opacity:0.06;
    white-space:nowrap;
    pointer-events:none;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.company-block{
    display:flex;
    align-items:center;
    gap:6px;
}

/* LOGO */
.logo{
    height:30px;
    object-fit:contain;
}

/* COMPANY NAME */
.company-name{
    font-size:13px;
    font-weight:bold;
}

/* LINE */
.divider{
    border:none;
    border-top:1px solid black;
    margin:2px 0;
}

/* AWB */
.awb{
    font-size:15px;
    font-weight:bold;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
    font-size:11px;
}

/* BLOCKS */
.left, .right{
    width:48%;
    text-align:left;
}

/* ARROW */
.arrow-box{
    position:absolute;
    top:5px;
    right:8px;
    text-align:center;
    font-size:9px;
}

.arrow{
    font-size:16px;
    display:block;
    margin-bottom:2px;
}

/* CHECKBOX */
.checkbox{
    margin-top:3px;
}

/* PRINT SETTINGS */
@page{
    size:100mm 50mm;
    margin:0;
}

@media print{

body{
    margin:0;
}

button,input,h2{
    display:none;
}

.label{
    page-break-after:avoid;
}

}
</style>

<script>
function updateLabel(){
    let company = document.getElementById("company").value;
    document.getElementById("companyText").innerText = company;
    document.getElementById("watermark").innerText = company;
}
</script>

</head>

<body>

<h2>Logistics Label Generator</h2>

<input id="company" placeholder="Company Name" oninput="updateLabel()">
<input id="awb" placeholder="AWB">
<input id="party" placeholder="Party">
<input id="po" placeholder="PO">
<input id="inv" placeholder="INV">
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="pkg" placeholder="PKG">

<br><br>
<button onclick="window.print()">Print Label</button>

<br><br>

<div class="label">

    <!-- WATERMARK -->
    <div class="watermark" id="watermark">COMPANY</div>

    <!-- HEADER -->
    <div class="header">
        <div class="company-block">
            <img src="logo.png" class="logo">
            <div class="company-name" id="companyText">COMPANY</div>
        </div>
    </div>

    <!-- ARROW -->
    <div class="arrow-box">
        <span class="arrow">⬆</span>
        THIS SIDE UP
    </div>

    <hr class="divider">

    <!-- AWB -->
    <div class="awb">
        AWB: <span id="awbText"></span>
    </div>

    <hr class="divider">

    <!-- DETAILS -->
    <div class="row">

        <div class="left">
            PARTY: <span id="partyText"></span><br>
            PO: <span id="poText"></span><br>
            FROM: <span id="fromText"></span><br>
            PKG: <span id="pkgText"></span>
        </div>

        <div class="right">
            INV: <span id="invText"></span><br>
            TO: <span id="toText"></span><br>

            <div class="checkbox">
                <label><input type="checkbox"> Train</label>
                <label><input type="checkbox"> Air</label>
                <label><input type="checkbox"> Road</label>
            </div>
        </div>

    </div>

</div>

<script>
const fields = ["awb","party","po","inv","from","to","pkg"];

fields.forEach(id=>{
    document.getElementById(id).addEventListener("input",()=>{
        document.getElementById(id+"Text").innerText = document.getElementById(id).value;
    });
});
</script>

</body>
</html>
